# this is the input to ssh. All input goes through here and selected 
# to go to some other pipeline.

input { pipeline { address => ssh } }

# events in ecs that we place here relevant on this level.
# [error][message]
#        [code]
#        [type]
#        [stack_trace]
#        [id]
#
# [event]
#        [action]
#        [category]
#        [code]
#        [created]  # we place @timestamp here
#        [dataset]  
#        [hash] # hash of the log to demonstrate integrity
#        [kind] # alert, asset, enrichment, event, metric, state, pipeline_error, signal
#        [module]
#        [outcome] # failure, success, unknown
#        [reason]
#        [reference] # link to where we find more data.. Misp event link etc.
#        [sequence]
#        [severity] # you can copy log.syslog.severity.code here if not a special one exists
#        [type] # access, admin, allowed, change, connection, creation, deletion, denied, device, end, error, group, indicator (array)
#
# [host]

filter {
  grok {
    id => "grok_ssh_parse"
    patterns_dir => ["/etc/logstash/patterns/pipes"]
    match => {
      "syslog_message" => "%{APP_SSH}"
    }
    tag_on_failure => ["_grokfail:pipeline=ssh:filter=grok_ssh_parse"]
  }

  # adding the higher level event fields
  if [syslog_message] =~ /^Accepted / {
    mutate {
      add_field => {
        "[event][action]" => "ssh_login"
        "[event][outcome]" => "success"
      }
    } # we use ruby to set array items since this works on most logstashversions
    ruby {
      code => '
        event.set("[event][type]", ["start"])
        event.set("[event][category]", ["authentication"])
      '
    }
  }
  else if [syslog_message] =~ /^Failed / or [syslog_message] =~ /^Invalid user/ or [syslog_message] =~ /authentication failure/ {
    mutate {
      add_field => {
        "[event][action]" => "ssh_login"
        "[event][outcome]" => "failure"
      }
    } # we use ruby to set array items since this works on most logstashversions
    ruby {
      code => '
        event.set("[event][type]", ["denied"])
        event.set("[event][category]", ["authentication"])
      '
    }
  }
  else if [syslog_message] =~ /^PAM service\(sshd\) ignoring max retries/ {
    mutate {
      add_field => {
        "[event][action]" => "ssh_pam_max_retries"
        "[event][outcome]" => "failure"
      }
    } # we use ruby to set array items since this works on most logstashversions
    ruby {
      code => '
        event.set("[event][type]", ["info"])
        event.set("[event][category]", ["authentication"])
      '
    }
  }
  else if [syslog_message] =~ /^Disconnecting invalid user/ {
    mutate {
      add_field => {
        "[event][action]" => "ssh_disconnect_invalid_user"
        "[event][outcome]" => "failure"
      }
    } # we use ruby to set array items since this works on most logstashversions
    ruby {
      code => '
        event.set("[event][type]", ["denied"])
        event.set("[event][category]", ["authentication"])
      '
    }
  } 
  else if [syslog_message] =~ /^error: maximum authentication attempts exceeded/ {
    mutate {
      add_field => {
        "[event][action]" => "ssh_max_auth_attempts"
        "[event][outcome]" => "failure"
      }
    } # we use ruby to set array items since this works on most logstashversions
    ruby {
      code => '
        event.set("[event][type]", ["denied"])
        event.set("[event][category]", ["authentication"])
      '
    }
  }
  else if [syslog_message] =~ /^Connection closed by \d{1,3}(\.\d{1,3}){3} port / {
    mutate {
      add_field => {
        "[event][action]" => "ssh_connection_closed"
      }
    } # we use ruby to set array items since this works on most logstashversions
    ruby {
      code => '
        event.set("[event][type]", ["end"])
        event.set("[event][category]", ["session"])
      '
    }
  }

  # for a second level . If we have a event.type already, and a user.name
  # we add a event.type user as well. else we add a event.type[0] of user
  if [user][name] {
    # we use ruby for this, since this handles array items on all logstash versions.
    ruby {
      code => '
        types = event.get("[event][type]")
        types = [] if types.nil?
        types = [types] unless types.is_a?(Array)
        types << "user" unless types.include?("user")
        event.set("[event][type]", types)
    '
    }
  } 

  # we add some metadata
  mutate {
    add_field => {
      "[event][module]" => "ssh"
      "[event][dataset]" => "ssh.auth"
      "[service][type]" => "ssh"
      "[service][name]" => "%{[process][name]}"
      "[network][transport]" => "tcp"
      "[network][protocol]" => "ssh"
    }
  }

}

output {
  pipeline { send_to => output }
}

