#   https://www.elastic.co/guide/en/logstash/current/multiple-pipelines.html

- pipeline.id: input
  path.config: "/etc/logstash/conf.d/01-input.conf"
- pipeline.id: syslog
  path.config: "/etc/logstash/conf.d/02-syslog.conf"
- pipeline.id: linux-networkmanager
  path.config: "/etc/logstash/conf.d/03-linux-networkmanager.conf"
- pipeline.id: ssh
  path.config: "/etc/logstash/conf.d/03-ssh.conf"
- pipeline.id: sudo
  path.config: "/etc/logstash/conf.d/03-sudo.conf"
- pipeline.id: linux-wpa-supplicant
  path.config: "/etc/logstash/conf.d/03-linux-wpa-supplicant.conf"
- pipeline.id: output
  path.config: "/etc/logstash/conf.d/10-output.conf"


